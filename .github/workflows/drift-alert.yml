name: Drift Alert

on:
  push:
    branches: [main]
    paths:
      - drift-log.md

jobs:
  create-drift-issue:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2   # need HEAD and HEAD~1 for the diff

      - name: Extract newly added drift entry
        id: extract
        run: |
          python3 << 'PYEOF'
          import re, subprocess, sys, os

          # ── Step 1: find headings ADDED in this specific commit ──────────────
          diff = subprocess.run(
              ['git', 'diff', 'HEAD~1', 'HEAD', '--', 'drift-log.md'],
              capture_output=True, text=True
          ).stdout

          # Lines that start with "+## " are newly added headings
          added = re.findall(r'^\+## (.+)', diff, re.MULTILINE)

          # Exclude the template placeholder and any artifact of the code fence
          added = [
              h for h in added
              if not h.startswith('Template')
              and not re.match(r'YYYY-MM-DD', h)
          ]

          if not added:
              print('No new drift headings in this commit — skipping issue creation')
              # Signal the next step to skip
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write('skip=true\n')
              sys.exit(0)

          new_heading = added[0]   # first newly added heading
          print(f'New heading: {new_heading}')

          # ── Step 2: extract the full section from the file ───────────────────
          with open('drift-log.md', 'r') as f:
              content = f.read()

          # Strip code fences to prevent template code block from leaking
          stripped = re.sub(r'```[\s\S]*?```', '[code block]', content)

          # Find the section starting at our heading and ending at the next ##
          pattern = r'(## ' + re.escape(new_heading) + r'[\s\S]*?)(?=\n## |\Z)'
          m = re.search(pattern, stripped)
          entry_body = m.group(1).strip() if m else f'## {new_heading}\n\n(full entry could not be extracted — check drift-log.md)'

          with open('drift_entry.md', 'w') as f:
              f.write(entry_body)
          with open('drift_heading.txt', 'w') as f:
              f.write(new_heading)

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write('skip=false\n')

          print(f'Extracted {len(entry_body)} chars for issue body')
          PYEOF

      - name: Create issue and ensure labels exist
        if: steps.extract.outputs.skip != 'true' && hashFiles('drift_heading.txt') != ''
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');

            if (!fs.existsSync('drift_heading.txt')) {
              console.log('No drift_heading.txt — skipping');
              return;
            }

            const heading = fs.readFileSync('drift_heading.txt', 'utf8').trim();
            const entryBody = fs.readFileSync('drift_entry.md', 'utf8').trim();

            // Ensure labels exist
            const labels = [
              { name: 'drift',        color: 'f97316', description: 'Drift detected between repos' },
              { name: 'needs-review', color: 'ef4444', description: 'Requires review before action' },
            ];
            for (const label of labels) {
              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  ...label,
                });
              } catch (e) {
                if (e.status !== 422) throw e;  // 422 = already exists
              }
            }

            const body = [
              `**New entry logged in [drift-log.md](https://github.com/${context.repo.owner}/${context.repo.repo}/blob/main/drift-log.md)**`,
              '',
              '---',
              '',
              entryBody,
              '',
              '---',
              `_Triggered by commit \`${context.sha.slice(0, 7)}\` pushed by @${context.actor}_`,
            ].join('\n');

            await github.rest.issues.create({
              owner:  context.repo.owner,
              repo:   context.repo.repo,
              title:  `Drift detected — ${heading}`,
              body,
              labels: ['drift', 'needs-review'],
            });

            console.log(`Issue created for: ${heading}`);
