name: Drift Alert (Daily Digest)

on:
  schedule:
    - cron: '0 9 * * *'   # daily at 9am UTC
  workflow_dispatch:        # allow manual trigger for testing

jobs:
  drift-digest:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed to inspect yesterday's commits

      - name: Collect drift entries added in last 24 hours
        id: collect
        run: |
          python3 << 'PYEOF'
          import re, subprocess, sys, os, json
          from datetime import datetime, timezone, timedelta

          cutoff = datetime.now(timezone.utc) - timedelta(hours=24)
          cutoff_str = cutoff.strftime('%Y-%m-%dT%H:%M:%SZ')

          # All commits to drift-log.md in the last 24h
          log = subprocess.run(
              ['git', 'log', f'--after={cutoff_str}', '--format=%H', '--', 'drift-log.md'],
              capture_output=True, text=True
          ).stdout.strip()

          commits = [c for c in log.splitlines() if c]
          print(f'Commits to drift-log.md in last 24h: {len(commits)}')

          if not commits:
              print('No new drift entries — skipping')
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write('skip=true\n')
              sys.exit(0)

          # Collect all new headings across all commits
          all_entries = []
          seen_headings = set()

          for sha in commits:
              diff = subprocess.run(
                  ['git', 'diff', f'{sha}~1', sha, '--', 'drift-log.md'],
                  capture_output=True, text=True
              ).stdout

              added_headings = re.findall(r'^\+## (.+)', diff, re.MULTILINE)
              added_headings = [
                  h for h in added_headings
                  if not h.startswith('Template')
                  and not re.match(r'YYYY-MM-DD', h)
                  and h not in seen_headings
              ]

              if not added_headings:
                  continue

              # Read the current drift-log.md to extract full section bodies
              with open('drift-log.md', 'r') as f:
                  content = f.read()
              stripped = re.sub(r'```[\s\S]*?```', '[code block]', content)

              for heading in added_headings:
                  seen_headings.add(heading)
                  pattern = r'(## ' + re.escape(heading) + r'[\s\S]*?)(?=\n## |\Z)'
                  m = re.search(pattern, stripped)
                  body = m.group(1).strip() if m else f'## {heading}\n\n(body not extractable — check drift-log.md)'
                  all_entries.append({'heading': heading, 'body': body})

          if not all_entries:
              print('Commits found but no new headings — skipping')
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write('skip=true\n')
              sys.exit(0)

          print(f'New drift entries: {len(all_entries)}')

          with open('drift_entries.json', 'w') as f:
              json.dump(all_entries, f)

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write('skip=false\n')
              f.write(f'count={len(all_entries)}\n')
          PYEOF

      - name: Create single digest issue
        if: steps.collect.outputs.skip != 'true'
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');

            if (!fs.existsSync('drift_entries.json')) {
              console.log('No drift_entries.json — skipping');
              return;
            }

            const entries = JSON.parse(fs.readFileSync('drift_entries.json', 'utf8'));
            const today = new Date().toISOString().slice(0, 10);

            // Dedupe: skip if a drift digest issue already exists for today
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              state: 'open',
              labels: 'drift',
            });

            const alreadyToday = existing.some(i =>
              i.title.includes(today) || i.created_at.startsWith(today)
            );

            if (alreadyToday) {
              console.log('Drift digest issue already created today — skipping');
              return;
            }

            // Ensure labels exist
            const labels = [
              { name: 'drift',        color: 'f97316', description: 'Drift detected between repos' },
              { name: 'needs-review', color: 'ef4444', description: 'Requires review before action' },
            ];
            for (const label of labels) {
              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner, repo: context.repo.repo, ...label,
                });
              } catch (e) {
                if (e.status !== 422) throw e;
              }
            }

            const sections = entries.map(e => e.body).join('\n\n---\n\n');
            const plural = entries.length === 1 ? '1 entry' : `${entries.length} entries`;

            const body = [
              `**Daily drift digest — ${today}** (${plural})`,
              '',
              `See [drift-log.md](https://github.com/${context.repo.owner}/${context.repo.repo}/blob/main/drift-log.md) for the full log.`,
              '',
              '---',
              '',
              sections,
              '',
              '---',
              `_Automated daily digest — runs at 09:00 UTC_`,
            ].join('\n');

            await github.rest.issues.create({
              owner:  context.repo.owner,
              repo:   context.repo.repo,
              title:  `Drift digest — ${today} (${plural})`,
              body,
              labels: ['drift', 'needs-review'],
            });

            console.log(`Digest issue created for ${today} with ${entries.length} entries`);
